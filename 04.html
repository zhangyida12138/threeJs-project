<!DOCTYPE html>
<html>
<head>
    <title>我的第一个 Three.js 页面</title>
    <style> body { margin: 0; } </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // Three.js 的核心库很精简，鼠标控制功能放在一个叫 OrbitControls 的扩展模块里。我们需要在代码顶部引入它。
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        // 1. 创建场景
        const scene = new THREE.Scene();
        // 1.1 创建loader实例，准备加载模型
        const gltfLoader = new GLTFLoader();
        // 开始加载
        gltfLoader.load(
            './04Model/rubber_duck_toy_1k.gltf', // 你的文件路径
            (gltf) => {
                const model = gltf.scene;
                
                // 记得把它放到场景里！
                scene.add(model);

                // 如果模型太大或太小，可以通过代码缩放
                model.scale.set(5, 5, 5); 

                console.log("模型加载成功！", gltf);
            },
            (xhr) => {
                // 加载进度
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            (error) => {
                // 报错处理
                console.error('加载模型出错了：', error);
            }
        );
        scene.background = new THREE.Color(0x202020); // 设置背景颜色为深灰色

        // 2. 创建摄像机 (视野角度, 宽高比, 近剪裁面, 远剪裁面)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2,2,5); // 稍微斜着看，有立体感

        // 3. 创建渲染器并添加到 DOM
        const renderer = new THREE.WebGLRenderer({antialias: true}); // 开启抗锯齿
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ----核心交互：初始化控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 启用阻尼效果(让旋转停下来时有惯性，手感更加丝滑)

        // 4. 为了更好地观察空间，添加网格辅助
        const gridHelper = new THREE.GridHelper(10, 10); // 大小10，分成10格
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(5); // 红色代表 X 轴，绿色代表 Y 轴，蓝色代表 Z 轴
        scene.add(axesHelper);
        // 5. 添加一个绿色的方块 (物体 = 形状 + 材质)
        // const geometry = new THREE.BoxGeometry(1, 1, 1); // 形状：立方体

        // const textureLoader = new THREE.TextureLoader();
        // // 5.1 加载一张木纹图片
        // const woodTexture = textureLoader.load('https://threejs.org/examples/textures/crate.gif');

        // const material = new THREE.MeshStandardMaterial({ 
        //     map: woodTexture // 把图片贴在材质的 map 属性上
        // });

        // const cube = new THREE.Mesh(geometry, material); // 网格对象
        // cube.castShadow = true; // 让方块投射阴影
        // scene.add(cube); // 将方块放入场景

        // 6. 添加地面：接收影子
        const planeGeometry = new THREE.PlaneGeometry(10, 10);
        const planeMaterial = new THREE.MeshStandardMaterial({color: 0x808080 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2; // 把平面旋转过来当地面
        plane.position.y = -0.5; // 把地面稍微往下挪一点，避免和方块重叠
        plane.receiveShadow = true; // 让地面接收阴影
        scene.add(plane);

        // --- 核心： 光影设置 ---

        // A. 环境光： 让暗部不至于全黑
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // 白色，强度0.5
        scene.add(ambientLight);

        // B. 平行光： 模拟太阳光，能投射阴影
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5); // 白色，强度1.5
        directionalLight.position.set(5, 10, 7.5); // 从斜上方照射
        directionalLight.castShadow = true; // 让光源投射阴影

        // B.1 阴影参数设置：提高质量，调整范围
        directionalLight.shadow.mapSize.width = 4096; // 阴影贴图分辨率（默认512，太低会有锯齿）
        directionalLight.shadow.mapSize.height = 4096;
        directionalLight.shadow.camera.near = 0.5; // 阴影相机的近剪裁面
        directionalLight.shadow.camera.far = 50; // 阴影相机的远剪裁面
        directionalLight.shadow.camera.left = -10; // 阴影相机的左边界
        directionalLight.shadow.camera.right = 10; // 阴影相机的右边界
        directionalLight.shadow.camera.top = 10; // 阴影相机的上边界
        directionalLight.shadow.camera.bottom = -10; // 阴影相机的下边界
        scene.add(directionalLight);

        // C. 渲染器设置：开启阴影计算
        renderer.shadowMap.enabled = true;

        // D. 调试工具，查看灯泡位置
        const helper = new THREE.DirectionalLightHelper(directionalLight, 1);
        scene.add(helper);

        // 7. 动画循环 (让方块动起来)
        function animate() {
            requestAnimationFrame(animate);

            // --- 核心改动：必须在每一帧更新控制器 ---
            controls.update();

            renderer.render(scene, camera); // 核心：每一帧都重新渲染一次
        }

        // 8. 窗口大小自适应（防止拉伸）
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
